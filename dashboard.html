<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据看板 - 孤独的小王子</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            background: linear-gradient(90deg, #ffd700, #ff6b6b, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
            border: 3px solid #5a5a7a;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .stat-card.today {
            border-color: #3498db;
            box-shadow: 0 0 20px rgba(52,152,219,0.3);
        }
        .stat-card.total {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        .stat-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .stat-label {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 42px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        .stat-card.today .stat-value {
            color: #3498db;
            text-shadow: 0 0 10px rgba(52,152,219,0.5);
        }
        .chart-container {
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
            border: 3px solid #5a5a7a;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .chart-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
        }
        .chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 300px;
            gap: 10px;
        }
        .bar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 100px;
        }
        .bar-container {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-bottom: 10px;
            height: 220px;
            align-items: flex-end;
        }
        .bar {
            width: 35px;
            border-radius: 8px 8px 0 0;
            transition: height 0.5s ease;
        }
        .bar.visitors {
            background: linear-gradient(to top, #3498db, #74b9ff);
        }
        .bar.visits {
            background: linear-gradient(to top, #e74c3c, #ff6b6b);
        }
        .bar-label {
            font-size: 12px;
            color: #aaa;
            text-align: center;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        .legend-color.visitors {
            background: linear-gradient(to top, #3498db, #74b9ff);
        }
        .legend-color.visits {
            background: linear-gradient(to top, #e74c3c, #ff6b6b);
        }
        .refresh-btn {
            display: block;
            margin: 30px auto;
            padding: 15px 40px;
            font-size: 18px;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(to bottom, #9b59b6 0%, #8e44ad 100%);
            border: 3px solid #6c3483;
            color: white;
            cursor: pointer;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 5px 0 #5b2c6f;
            transition: all 0.2s;
        }
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #5b2c6f;
        }
        .refresh-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #5b2c6f;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #9b59b6;
            text-decoration: none;
            font-size: 16px;
        }
        .back-link a:hover {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 数据看板</h1>
        
        <div class="stats-grid">
            <div class="stat-card today">
                <div class="stat-icon">👥</div>
                <div class="stat-label">今日访问人数</div>
                <div class="stat-value" id="todayVisitors">0</div>
            </div>
            <div class="stat-card today">
                <div class="stat-icon">🔄</div>
                <div class="stat-label">今日访问次数</div>
                <div class="stat-value" id="todayVisits">0</div>
            </div>
            <div class="stat-card total">
                <div class="stat-icon">👑</div>
                <div class="stat-label">累计访问人数</div>
                <div class="stat-value" id="totalVisitors">0</div>
            </div>
            <div class="stat-card total">
                <div class="stat-icon">📈</div>
                <div class="stat-label">累计访问次数</div>
                <div class="stat-value" id="totalVisits">0</div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">📅 近7天数据趋势</div>
            <div class="chart" id="chart"></div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color visitors"></div>
                    <span>访问人数</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color visits"></div>
                    <span>访问次数</span>
                </div>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="loadStats()">🔄 刷新数据</button>
        
        <div class="back-link">
            <a href="index.html">🎮 返回游戏</a>
        </div>
    </div>

    <script>
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('todayVisitors').textContent = data.today.visitors;
                document.getElementById('todayVisits').textContent = data.today.visits;
                document.getElementById('totalVisitors').textContent = data.total.visitors;
                document.getElementById('totalVisits').textContent = data.total.visits;
                
                renderChart(data.last7Days);
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }
        
        function renderChart(data) {
            const chart = document.getElementById('chart');
            chart.innerHTML = '';
            
            const maxValue = Math.max(...data.map(d => Math.max(d.visitors, d.visits)), 1);
            
            data.forEach(day => {
                const barGroup = document.createElement('div');
                barGroup.className = 'bar-group';
                
                const barContainer = document.createElement('div');
                barContainer.className = 'bar-container';
                
                const visitorsBar = document.createElement('div');
                visitorsBar.className = 'bar visitors';
                visitorsBar.style.height = (day.visitors / maxValue * 200) + 'px';
                
                const visitsBar = document.createElement('div');
                visitsBar.className = 'bar visits';
                visitsBar.style.height = (day.visits / maxValue * 200) + 'px';
                
                barContainer.appendChild(visitorsBar);
                barContainer.appendChild(visitsBar);
                
                const label = document.createElement('div');
                label.className = 'bar-label';
                label.textContent = day.date.slice(5);
                
                barGroup.appendChild(barContainer);
                barGroup.appendChild(label);
                chart.appendChild(barGroup);
            });
        }
        
        loadStats();
        setInterval(loadStats, 60000);
    </script>
</body>
</html>
